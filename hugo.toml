baseURL = 'https://fieryeagle.org'
languageCode = 'en-us'
title = ''
theme = 'hello-friend-ng'
paginate = 10
enableRobotsTXT = true

[params]  
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"

  # Subtitle for home
  homeSubtitle = ""

  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  disableReadOtherPosts = false

  # Enable sharing buttons, if you like
  enableSharingButtons = false
  
  # Show a global language switcher in the navigation bar
  enableGlobalLanguageMenu = false

  # Metadata mostly used in document's head
  description = "Fiery's site"
  keywords = "homepage"
  images = [""]

[taxonomies]
    category = "blog"
    tag      = "tags"

[languages]
  [languages.en]
    title = "Fiery's site"
    copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
    

  [languages.en.params]
    subtitle  = ""
    keywords = ""
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "Hello!"
      logoHomeLink = "/"

    # or
    #
    #path = "/favicon.ico"
    # alt = "Your example logo alt text"

  # And you can even create generic menu

  [[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "/about"

  [[menu.main]]
    identifier = "downloads"
    name       = "Downloads"
    url        = "/downloads"

  [[params.social]]
    name = "twitter"
    url  = "https://twitter.com/Fiery_Eagle"

  [[params.social]]
    name = "github"
    url  = "https://github.com/FieryEagle"

  [[params.social]]
    name = "discord"
    url  = "http://discordapp.com/users/345153972765720577"

  [[params.social]]
    name = "steam"
    url  = "https://steamcommunity.com/id/FieryEagle/"

  [[params.social]]
    name = "twitch"
    url  = "https://www.twitch.tv/fiery_eagle"

  [[params.social]]
    name = "kofi"
    url  = "https://ko-fi.com/fieryeagle"
